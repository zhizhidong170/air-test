<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷氣人格測驗</title>

<style>
body{
    font-family:"Microsoft JhengHei";
    background:#f4f8fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
}

h1{text-align:center;color:#0088cc;}
.subtitle{text-align:center;margin-bottom:20px;}

.question{
    margin-bottom:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

label{display:block;padding:5px 0;}

button{
    width:100%;
    padding:15px;
    background:#0099dd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}

#result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#f7f7f7;
    border-radius:10px;
}

.result-title{
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>❄️ 冷氣人格測驗</h1>
<p class="subtitle">測測你是哪一種冷氣人格</p>

<form id="quizForm">

<!-- Q1 -->
<div class="question">
<h3>Q1 買東西最在意？</h3>
<label><input type="radio" name="q1" value="A"> CP值</label>
<label><input type="radio" name="q1" value="B"> 專業</label>
<label><input type="radio" name="q1" value="C"> 耐用</label>
<label><input type="radio" name="q1" value="D"> 技術</label>
<label><input type="radio" name="q1" value="E"> 隨意</label>
</div>

<!-- Q2 -->
<div class="question">
<h3>Q2 裝潢想法？</h3>
<label><input type="radio" name="q2" value="A"> CP值最好</label>
<label><input type="radio" name="q2" value="B"> 施工專業</label>
<label><input type="radio" name="q2" value="C"> 一次做好</label>
<label><input type="radio" name="q2" value="D"> 設計感</label>
<label><input type="radio" name="q2" value="E"> 有冷氣就好</label>
</div>

<!-- Q3 -->
<div class="question">
<h3>Q3 工作風格？</h3>
<label><input type="radio" name="q3" value="A"> 效率派</label>
<label><input type="radio" name="q3" value="B"> 細節派</label>
<label><input type="radio" name="q3" value="C"> 穩定派</label>
<label><input type="radio" name="q3" value="D"> 技術派</label>
<label><input type="radio" name="q3" value="E"> 隨便派</label>
</div>

<!-- Q4 -->
<div class="question">
<h3>Q4 朋友眼中的你？</h3>
<label><input type="radio" name="q4" value="A"> 精打細算</label>
<label><input type="radio" name="q4" value="B"> 可靠</label>
<label><input type="radio" name="q4" value="C"> 有原則</label>
<label><input type="radio" name="q4" value="D"> 有品味</label>
<label><input type="radio" name="q4" value="E"> 好相處</label>
</div>

<!-- Q5 -->
<div class="question">
<h3>Q5 選車？</h3>
<label><input type="radio" name="q5" value="A"> 配備多</label>
<label><input type="radio" name="q5" value="B"> 技術強</label>
<label><input type="radio" name="q5" value="C"> 保值</label>
<label><input type="radio" name="q5" value="D"> 操控好</label>
<label><input type="radio" name="q5" value="E"> 順眼</label>
</div>

<!-- Q6 -->
<div class="question">
<h3>Q6 大消費？</h3>
<label><input type="radio" name="q6" value="A"> 比價格</label>
<label><input type="radio" name="q6" value="B"> 看技術</label>
<label><input type="radio" name="q6" value="C"> 看長期</label>
<label><input type="radio" name="q6" value="D"> 看評測</label>
<label><input type="radio" name="q6" value="E"> 聽朋友</label>
</div>

<!-- Q7 -->
<div class="question">
<h3>Q7 合作夥伴？</h3>
<label><input type="radio" name="q7" value="A"> 效率</label>
<label><input type="radio" name="q7" value="B"> 專業</label>
<label><input type="radio" name="q7" value="C"> 穩定</label>
<label><input type="radio" name="q7" value="D"> 創意</label>
<label><input type="radio" name="q7" value="E"> 好相處</label>
</div>

<!-- Q8 -->
<div class="question">
<h3>Q8 你認同？</h3>
<label><input type="radio" name="q8" value="A"> CP值</label>
<label><input type="radio" name="q8" value="B"> 專業</label>
<label><input type="radio" name="q8" value="C"> 品質</label>
<label><input type="radio" name="q8" value="D"> 細節</label>
<label><input type="radio" name="q8" value="E"> 開心就好</label>
</div>

<button type="button" onclick="showResult()">查看結果</button>

</form>

<div id="result"></div>

</div>

<script>

const personalities = {

A:{
title:"🔵 Panasonic人格｜務實革新派",
text:`你是一個很懂得平衡的人。

比起最高規格，你更在意整體價值。

你重視CP值，喜歡做最划算的選擇。

Panasonic精神就是讓科技融入生活，你也是這種務實派。`
},

B:{
title:"🟡 大金人格｜專業職人派",
text:`你重視專業與細節。

做事講求穩定與可靠。

你相信專業決定結果。`
},

C:{
title:"🔴 日立人格｜長期投資派",
text:`你看重長期價值。

不只看價格，而是看未來。

你相信穩定比便宜重要。`
},

D:{
title:"⚫ 三菱重工人格｜工藝技術派",
text:`你喜歡研究技術與原理。

你不只看結果，更看背後細節。

你是理性分析型人格。`
},

E:{
title:"🟢 無品牌迷思｜自由體驗派",
text:`你重視感受，不被品牌限制。

適合你的，就是最好的。

你很自由也很隨和。`
}

};

function showResult(){

let score = {A:0,B:0,C:0,D:0,E:0};

for(let i=1;i<=8;i++){
let ans = document.querySelector(`input[name="q${i}"]:checked`);
if(!ans){
alert("請完成所有題目");
return;
}
score[ans.value]++;
}

let winner = Object.keys(score).reduce((a,b)=>
score[a] > score[b] ? a : b
);

document.getElementById("result").style.display = "block";
document.getElementById("result").innerHTML =
`<div class="result-title">${personalities[winner].title}</div>
<p>${personalities[winner].text}</p>`;

}

</script>

</body>
</html>
