<div id="startPage" class="start-page">

    <img src="your-image.jpg" class="start-image">

    <h1>❄️ 冷氣人格測驗</h1>

    <p>輸入你的名字，開始測驗</p>

    <input type="text" id="username" placeholder="輸入你的名字">

    <button onclick="startQuiz()">開始測驗</button>

</div>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷氣人格測驗</title>

<style>
body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f4f8fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0088cc;
}

.question{
    display:none;
}

.question.active{
    display:block;
}

label{
    display:block;
    padding:12px;
    margin:10px 0;
    background:#f2f2f2;
    border-radius:10px;
    cursor:pointer;
}

#result{
    display:none;
    white-space:pre-line;
    font-size:16px;
    line-height:1.8;
    padding:20px;
    background:#f7f7f7;
    border-radius:15px;
}

.result-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>❄️ 冷氣人格測驗</h1>

<!-- Q1 -->
<div class="question active" id="q1">
<h3>Q1. 買東西時你最在意什麼？</h3>
<label onclick="next('A')">A. 功能夠多、價格合理最重要</label>
<label onclick="next('B')">B. 產品背後的技術與專業度</label>
<label onclick="next('C')">C. 耐用穩定，用久一點沒關係</label>
<label onclick="next('D')">D. 設計、工藝與使用體驗</label>
<label onclick="next('E')">E. 好用就好，品牌不重要</label>
</div>

<!-- Q2 -->
<div class="question" id="q2">
<h3>Q2. 裝潢新家時你的想法是？</h3>
<label onclick="next('A')">A. 預算內做到最好</label>
<label onclick="next('B')">B. 看整體規劃與施工品質</label>
<label onclick="next('C')">C. 一次做好，未來少麻煩</label>
<label onclick="next('D')">D. 希望兼具質感與科技感</label>
<label onclick="next('E')">E. 有冷氣吹就好</label>
</div>

<!-- Q3 -->
<div class="question" id="q3">
<h3>Q3. 工作上你是哪種人？</h3>
<label onclick="next('A')">A. 最有效率的方案派</label>
<label onclick="next('B')">B. 重視流程與細節派</label>
<label onclick="next('C')">C. 穩紮穩打派</label>
<label onclick="next('D')">D. 喜歡研究新技術派</label>
<label onclick="next('E')">E. 隨遇而安派</label>
</div>

<!-- Q4 -->
<div class="question" id="q4">
<h3>Q4. 朋友眼中的你？</h3>
<label onclick="next('A')">A. 精打細算</label>
<label onclick="next('B')">B. 做事可靠</label>
<label onclick="next('C')">C. 很有原則</label>
<label onclick="next('D')">D. 有品味</label>
<label onclick="next('E')">E. 很好相處</label>
</div>

<!-- Q5 -->
<div class="question" id="q5">
<h3>Q5. 選車時你會偏向？</h3>
<label onclick="next('A')">A. 配備滿滿、價格合理</label>
<label onclick="next('B')">B. 品牌技術實力強</label>
<label onclick="next('C')">C. 耐開保值</label>
<label onclick="next('D')">D. 操控與工藝表現</label>
<label onclick="next('E')">E. 哪台順眼買哪台</label>
</div>

<!-- Q6 -->
<div class="question" id="q6">
<h3>Q6. 面對重大消費時你通常會？</h3>
<label onclick="next('A')">A. 先比較價格和功能</label>
<label onclick="next('B')">B. 研究規格與技術差異</label>
<label onclick="next('C')">C. 看長期使用成本</label>
<label onclick="next('D')">D. 看評測與實際體驗</label>
<label onclick="next('E')">E. 聽朋友推薦就好</label>
</div>

<!-- Q7 -->
<div class="question" id="q7">
<h3>Q7. 如果今天要選合作夥伴？</h3>
<label onclick="next('A')">A. 做事有效率</label>
<label onclick="next('B')">B. 專業能力強</label>
<label onclick="next('C')">C. 穩定可靠</label>
<label onclick="next('D')">D. 有創意和想法</label>
<label onclick="next('E')">E. 好相處最重要</label>
</div>

<!-- Q8 -->
<div class="question" id="q8">
<h3>Q8. 你最認同哪句話？</h3>
<label onclick="next('A')">A. 錢要花在刀口上</label>
<label onclick="next('B')">B. 專業的事交給專業</label>
<label onclick="next('C')">C. 品質決定價值</label>
<label onclick="next('D')">D. 細節成就完美</label>
<label onclick="next('E')">E. 開心就好</label>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

let scores = {A:0,B:0,C:0,D:0,E:0};
let current = 1;

const personalities = {

A:`🔵 Panasonic人格｜務實革新派

你是一個很懂得平衡的人。
比起一味追求最高規格，你更在意的是整體價值。
你會比較、會評估，是理性務實型。

✔ CP值導向
✔ 擅長規劃
✔ 不浪費
✔ 理性決策`,

B:`🟡 大金人格｜專業職人派

你重視專業與細節。

你相信實力勝過包裝。

✔ 專業至上
✔ 細節控
✔ 穩定可靠
✔ 值得信任`,

C:`🔴 日立人格｜長期投資派

你看重長期價值。

願意花時間換取穩定。

✔ 長期思維
✔ 穩定可靠
✔ 不衝動
✔ 重視品質`,

D:`⚫ 三菱重工人格｜工藝技術派

你喜歡研究技術與原理。

重視細節與突破。

✔ 技術導向
✔ 好奇心強
✔ 工藝精神
✔ 愛研究`,

E:`🟢 無品牌迷思人格｜自由體驗派

你不受品牌限制。

只看實際感受。

✔ 自由
✔ 不盲從
✔ 彈性高
✔ 重體驗`

};

function next(val){

scores[val]++;

document.getElementById("q"+current).classList.remove("active");
current++;

if(current > 8){
    showResult();
}else{
    document.getElementById("q"+current).classList.add("active");
}

}

function showResult(){

let winner = "A";
let max = -1;

for(let k in scores){
    if(scores[k] > max){
        max = scores[k];
        winner = k;
    }
}

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML =
`<div class="result-title">你的冷氣人格結果</div>
<pre>${personalities[winner]}</pre>`;
}

</script>

</body>
</html>
