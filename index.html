<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測測你的冷氣人格</title>

<style>
body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f4f8fb;
    margin:0;
    padding:20px;
    color:#333;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0088cc;
}

.subtitle{
    text-align:center;
    margin-bottom:30px;
}

.question{
    margin-bottom:30px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:12px;
}

.question h3{
    margin-top:0;
}

label{
    display:block;
    padding:8px 0;
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0099dd;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0077aa;
}

#result{
    margin-top:30px;
    display:none;
    padding:25px;
    border-radius:15px;
    background:#f7f7f7;
}

.result-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>❄️ 測測你的冷氣人格</h1>
<p class="subtitle">你最像哪一個冷氣品牌？</p>

<form id="quizForm">

<div class="question">
<h3>Q1. 買東西時你最在意什麼？</h3>
<label><input type="radio" name="q1" value="A"> 功能夠多、價格合理最重要</label>
<label><input type="radio" name="q1" value="B"> 產品背後的技術與專業度</label>
<label><input type="radio" name="q1" value="C"> 耐用穩定，用久一點沒關係</label>
<label><input type="radio" name="q1" value="D"> 設計、工藝與使用體驗</label>
<label><input type="radio" name="q1" value="E"> 好用就好，品牌不重要</label>
</div>

<div class="question">
<h3>Q2. 裝潢新家時你的想法是？</h3>
<label><input type="radio" name="q2" value="A"> 預算內做到最好</label>
<label><input type="radio" name="q2" value="B"> 看整體規劃與施工品質</label>
<label><input type="radio" name="q2" value="C"> 一次做好，未來少麻煩</label>
<label><input type="radio" name="q2" value="D"> 希望兼具質感與科技感</label>
<label><input type="radio" name="q2" value="E"> 有冷氣吹就好</label>
</div>

<div class="question">
<h3>Q3. 工作上你是哪種人？</h3>
<label><input type="radio" name="q3" value="A"> 最有效率的方案派</label>
<label><input type="radio" name="q3" value="B"> 重視流程與細節派</label>
<label><input type="radio" name="q3" value="C"> 穩紮穩打派</label>
<label><input type="radio" name="q3" value="D"> 喜歡研究新技術派</label>
<label><input type="radio" name="q3" value="E"> 隨遇而安派</label>
</div>

<div class="question">
<h3>Q4. 朋友眼中的你？</h3>
<label><input type="radio" name="q4" value="A"> 精打細算</label>
<label><input type="radio" name="q4" value="B"> 做事可靠</label>
<label><input type="radio" name="q4" value="C"> 很有原則</label>
<label><input type="radio" name="q4" value="D"> 有品味</label>
<label><input type="radio" name="q4" value="E"> 很好相處</label>
</div>

<div class="question">
<h3>Q5. 選車時你會偏向？</h3>
<label><input type="radio" name="q5" value="A"> 配備滿滿、價格合理</label>
<label><input type="radio" name="q5" value="B"> 品牌技術實力強</label>
<label><input type="radio" name="q5" value="C"> 耐開保值</label>
<label><input type="radio" name="q5" value="D"> 操控與工藝表現</label>
<label><input type="radio" name="q5" value="E"> 哪台順眼買哪台</label>
</div>

<div class="question">
<h3>Q6. 面對重大消費時，你通常會？</h3>
<label><input type="radio" name="q6" value="A"> 先比較價格和功能</label>
<label><input type="radio" name="q6" value="B"> 研究規格與技術差異</label>
<label><input type="radio" name="q6" value="C"> 看長期使用成本</label>
<label><input type="radio" name="q6" value="D"> 看評測與實際體驗</label>
<label><input type="radio" name="q6" value="E"> 聽朋友推薦就好</label>
</div>

<div class="question">
<h3>Q7. 如果今天要選合作夥伴，你會優先考慮？</h3>
<label><input type="radio" name="q7" value="A"> 做事有效率</label>
<label><input type="radio" name="q7" value="B"> 專業能力強</label>
<label><input type="radio" name="q7" value="C"> 穩定可靠</label>
<label><input type="radio" name="q7" value="D"> 有創意和想法</label>
<label><input type="radio" name="q7" value="E"> 好相處最重要</label>
</div>

<div class="question">
<h3>Q8. 你最認同哪句話？</h3>
<label><input type="radio" name="q8" value="A"> 錢要花在刀口上</label>
<label><input type="radio" name="q8" value="B"> 專業的事交給專業</label>
<label><input type="radio" name="q8" value="C"> 品質決定價值</label>
<label><input type="radio" name="q8" value="D"> 細節成就完美</label>
<label><input type="radio" name="q8" value="E"> 開心就好</label>
</div>

<button type="button" onclick="showResult()">查看我的冷氣人格</button>

</form>

<div id="result"></div>

</div>

<script>

const personalities = {

A:{
title:"🔵 Panasonic人格｜務實革新派",
text:"你是一個很懂得平衡的人。比起一味追求最高規格，你更在意的是整體價值。你喜歡把錢花在真正有感的地方，該省則省，該花則花。面對選擇時，你通常會先做功課、比較優缺點，再找出最適合自己的方案。你相信：真正厲害的產品，不是最昂貴，而是最符合需求。"
},

B:{
title:"🟡 大金人格｜專業職人派",
text:"你是一個非常重視專業的人。無論工作或生活，只要決定要做，就希望把事情做好。比起華麗包裝，你更欣賞那些看不見的細節與基本功。你相信每個環節都會影響最後成果，因此總是值得信賴。"
},

C:{
title:"🔴 日立人格｜長期投資派",
text:"你是一個很有遠見的人。做決定時不只看眼前，而是考慮長遠價值。你願意花更多時間評估，也願意投入更多成本，只要這個選擇值得。你相信真正昂貴的不是價格，而是後悔。"
},

D:{
title:"⚫ 三菱重工人格｜工藝技術派",
text:"你是一個對細節非常敏感的人。你喜歡研究產品背後的技術與設計，對於新事物不盲目追隨潮流，但若發現更好的方法與技術，也願意勇敢突破。你欣賞的不是表面的華麗，而是藏在裡面的真功夫。"
},

E:{
title:"🟢 無品牌迷思人格｜自由體驗派",
text:"你是一個很自在的人。你不喜歡被標籤，也不喜歡盲從。品牌只是參考，適合自己的才是答案。你更在意實際體驗與生活感受。"
}

};

function showResult(){

let scores = {A:0,B:0,C:0,D:0,E:0};

for(let i=1;i<=8;i++){

let answer = document.querySelector(`input[name="q${i}"]:checked`);

if(!answer){
alert("請先完成所有題目！");
return;
}

scores[answer.value]++;
}

let winner = Object.keys(scores).reduce((a,b)=>
scores[a] > scores[b] ? a : b
);

document.getElementById("result").innerHTML = `
<div class="result-title">${personalities[winner].title}</div>
<p>${personalities[winner].text}</p>
`;

document.getElementById("result").style.display = "block";

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
